stages:
  - build
  - test

default:
  image: maven:3.8.5-openjdk-17

build:
  stage: build
  script:
    - echo "Compiling the code..."
    - mvn clean package
    - echo "Compile complete."
  artifacts:
    paths:
      - target/*.jar

unit-test-job:
  stage: test
  script:
    - echo "Running tests and generating coverage report..."
    - mvn clean verify
  artifacts:
    paths:
      - target/site/jacoco/
  coverage: '/Total.*?([0-9]{1,3})%/'