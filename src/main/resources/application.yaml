server:
  port: ${SERVER_PORT:8081}

spring:
  config:
    import:
      - "sm@"
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME:teamConnect}
    password: ${sm@${DB_PASSWORD_SECRET:datasource-password}}
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: ${MAXFILESIZE:5MB}
      max-request-size: ${MAXREQUESTSIZE:10MB}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_URL}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  flyway:
    baseline-on-migrate: true
    baseline-version: 2

team:
  connect:
    calendarific:
      base-url: https://calendarific.com/api/v2
      api-key: ${sm@${CALENDARIFIC_API_KEY_SECRET:calendarific-api-key}}
    cron:
      holiday-sync: ${HOLIDAY_SYNC_CRON:0 0 0 30 11 *}
